services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://api:8000

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ENV=development

